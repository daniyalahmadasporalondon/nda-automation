name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11 is the PROD interpreter (Dockerfile: FROM python:3.11-slim).
        # Keep it in the matrix so the exact deployed interpreter is gated,
        # alongside the supported floor (3.9) and ceiling (3.12).
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          # Full history so the cache-bust guards can walk index.html history
          # to locate each asset's last token-bump commit (--tree) and resolve
          # the push/PR base ref (--base).
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install pinned CI tools
        run: python -m pip install --constraint requirements-ci.txt ruff pytest

      - name: Install Python dependencies
        run: python -m pip install --constraint requirements-ci.txt -e ".[pdf,gmail]"

      - name: Lint Python
        run: ruff check nda_automation tests

      - name: Compile Python
        run: python -m py_compile nda_automation/*.py

      - name: Check Gmail OAuth dependencies
        run: |
          python - <<'PY'
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build

          assert Credentials is not None
          assert build is not None
          PY

      - name: Run Gmail and OAuth tests
        run: python -m pytest -q tests/test_user_store.py tests/test_server.py -k "gmail or google_oauth or oauth or google_identity"

      - name: Run Python tests
        run: python -m pytest -q

      - name: Guard static cache-bust tokens
        # Fail if a static asset changed without bumping its ?v= token in
        # static/index.html. On PRs, diff against the merge base; on pushes,
        # diff against the previous commit.
        run: |
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            git fetch --no-tags --depth=1 origin "${GITHUB_BASE_REF}"
            BASE="origin/${GITHUB_BASE_REF}"
          else
            BASE="${{ github.event.before }}"
            if [ -z "${BASE}" ] || ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
              BASE="HEAD~1"
            fi
          fi
          python3 scripts/cache_bust_guard.py --base "${BASE}"

      - name: Guard static cache-bust tokens (whole-tree)
        # Absolute check, independent of the diff range: every versioned asset's
        # current bytes must match its bytes as of the commit that last bumped
        # its ?v= token. Catches staleness split across commits (token bumped in
        # one commit, asset bytes changed in a later one) -- the failure mode the
        # range-diff step above can miss (and that shipped to prod, e.g.
        # de9aed0c). Needs full history (fetch-depth: 0 above).
        run: python3 scripts/cache_bust_guard.py --tree

      - name: Check JavaScript syntax
        run: |
          find static -name '*.js' -print0 | xargs -0 -n1 node --check
          node --check tests/frontend/review-workstation.cjs
          node --check tests/frontend/review-recovery.cjs

  frontend:
    name: Frontend behavior
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Python dependencies
        run: python -m pip install --constraint requirements-ci.txt -e ".[pdf,gmail]"

      - name: Install browser test dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run frontend behavior tests
        run: npm run test:frontend

      - name: Run admin AI model picker panel test
        run: npm run test:frontend:admin-models

      - name: Run review-failure notification test
        run: npm run test:frontend:notifications

      - name: Run shimmer-skeleton loading-state test
        run: npm run test:frontend:shimmer

      - name: Run review-recovery transition test
        run: npm run test:frontend:review-recovery

      - name: Run frontend utility-module unit tests
        run: npm run test:frontend:utils

      - name: Run editor format toolbar tests
        run: npm run test:frontend:editor-format

      - name: Run generator term Years/Months selector test
        run: npm run test:frontend:generator-term-unit

      - name: Run entity law/court coupling test
        run: npm run test:frontend:entity-court-coupling

      - name: Run faithful-render cold-start engagement test
        run: npm run test:frontend:faithful-coldstart

      - name: Run faithful redline/clean upgrade test
        run: npm run test:frontend:faithful-redline-clean

  docker-build:
    # PROD runs the repo Dockerfile (python:3.11-slim + the FULL
    # `.[pdf,gmail,tables]` set), which the `test`/`frontend` jobs never
    # exercise — they install only `.[pdf,gmail]` on 3.9/3.11/3.12. Past prod
    # breaks (the camelot resolution war, the PyMuPDF ABI -> blank PDF pages)
    # passed CI green yet failed the Render build. This job resolves the full
    # dependency set in the exact deployed image and runs the Dockerfile's
    # build-time smoke assert (`import fitz; fitz.open(); import pdf2docx`),
    # turning a silent prod build break into a red PR. Build-only — no push,
    # no registry creds.
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build prod image (resolves full deps + runs fitz/pdf2docx assert)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
