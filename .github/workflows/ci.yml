name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install pinned CI tools
        run: python -m pip install --constraint requirements-ci.txt ruff pytest

      - name: Install Python dependencies
        run: python -m pip install --constraint requirements-ci.txt -e ".[pdf,gmail]"

      - name: Lint Python
        run: ruff check nda_automation tests

      - name: Compile Python
        run: python -m py_compile nda_automation/*.py

      - name: Check Gmail OAuth dependencies
        run: |
          python - <<'PY'
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build

          assert Credentials is not None
          assert build is not None
          PY

      - name: Run Gmail and OAuth tests
        run: python -m pytest -q tests/test_user_store.py tests/test_server.py -k "gmail or google_oauth or oauth or google_identity"

      - name: Run Python tests
        run: python -m pytest -q

      - name: Check JavaScript syntax
        run: |
          find static -name '*.js' -print0 | xargs -0 -n1 node --check
          node --check tests/frontend/review-workstation.cjs

  frontend:
    name: Frontend behavior
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Python dependencies
        run: python -m pip install --constraint requirements-ci.txt -e ".[pdf,gmail]"

      - name: Install browser test dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run frontend behavior tests
        run: npm run test:frontend
