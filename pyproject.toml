[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "nda-automation"
version = "0.1.0"
description = "A small NDA hard-clause checker."
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
  "pypdf>=6.0",
]

[project.optional-dependencies]
gmail = [
  "google-api-python-client>=2.0",
  "google-auth>=2.0",
]

[tool.setuptools]
packages = ["nda_automation"]

[tool.ruff.lint]
select = ["F"]
