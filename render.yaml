services:
  - type: web
    name: nda-automation
    runtime: python
    plan: starter
    buildCommand: python -m pip install --upgrade pip && python -m pip install ".[pdf,gmail]"
    startCommand: python -m nda_automation.server --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: NDA_REQUIRE_AUTH
        value: "true"
      - key: NDA_AUTH_USERNAME
        value: nda-admin
      - key: NDA_AUTH_PASSWORD
        sync: false
      - key: NDA_ALLOWED_HOSTS
        sync: false
      - key: NDA_GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: NDA_GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: NDA_GOOGLE_OAUTH_REDIRECT_URI
        sync: false
      - key: NDA_GMAIL_OAUTH_REDIRECT_URI
        sync: false
      - key: NDA_DATA_DIR
        value: /var/data
      - key: NDA_USERS_PATH
        value: /var/data/users.json
      - key: NDA_EXPORTS_DIR
        value: /var/data/exports
      - key: NDA_RATE_LIMIT_PER_MINUTE
        value: "120"
      - key: NDA_AI_REVIEW_ENABLED
        value: "true"
      - key: NDA_AI_PROVIDER
        value: alibaba
      - key: NDA_AI_MODEL
        value: qwen3.5-122b-a10b
      - key: ALIBABA_API_KEY
        sync: false
      - key: NDA_GMAIL_TRIAGE_API_KEY
        sync: false
      - key: NDA_GMAIL_TRIAGE_MODEL
        value: qwen/qwen3-32b
    disk:
      name: nda-automation-data
      mountPath: /var/data
      sizeGB: 1
