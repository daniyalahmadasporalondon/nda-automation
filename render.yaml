services:
  - type: web
    name: nda-automation
    runtime: docker
    plan: standard
    healthCheckPath: /healthz
    disk:
      name: nda-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: NDA_REQUIRE_AUTH
        value: "true"
      # Per-user Google OAuth (below) is the tenant boundary: each signed-in
      # account owns and only sees its own matters. HTTP Basic auth is a single
      # break-glass operator credential, NOT a shared multi-user login, so its
      # username is operator-set (sync: false) rather than a baked-in shared
      # "nda-admin" that would collapse every operator into one authz identity.
      - key: NDA_AUTH_USERNAME
        sync: false
      - key: NDA_AUTH_PASSWORD
        sync: false
      # Identities (Google account id or Basic username) allowed to use
      # admin-only endpoints such as the full matter backup export.
      - key: NDA_ADMIN_USERS
        sync: false
      - key: NDA_ALLOWED_HOSTS
        sync: false
      - key: NDA_GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: NDA_GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: NDA_GOOGLE_OAUTH_REDIRECT_URI
        sync: false
      - key: NDA_GMAIL_OAUTH_REDIRECT_URI
        sync: false
      # DocuSign e-signature OAuth (Authorization Code Grant) — same shape as the
      # Google OAuth above. In the Render dashboard set the integration key, the
      # secret, and the redirect URI (https://<your-render-host>/auth/docusign/callback,
      # registered on the DocuSign integration key). NDA_DOCUSIGN_AUTH_SERVER picks
      # the DocuSign environment: "demo" (free developer sandbox) or "production".
      - key: NDA_DOCUSIGN_CLIENT_ID
        sync: false
      - key: NDA_DOCUSIGN_CLIENT_SECRET
        sync: false
      - key: NDA_DOCUSIGN_OAUTH_REDIRECT_URI
        sync: false
      - key: NDA_DOCUSIGN_AUTH_SERVER
        value: demo
      - key: NDA_DOCUSIGN_CONNECT_HMAC_KEY
        sync: false
      # The single default Aspora signatory (name + email) used for ALL Aspora
      # signing entities when sending a DocuSign envelope. Set BOTH in the Render
      # dashboard to make Aspora a routable signer on every generated NDA; leaving
      # either unset omits the Aspora signer (backward compatible).
      - key: NDA_DOCUSIGN_ASPORA_SIGNER_NAME
        sync: false
      - key: NDA_DOCUSIGN_ASPORA_SIGNER_EMAIL
        sync: false
      # Durable application state lives on the persistent disk mounted at
      # /var/data (the `disk:` block above). The startup storage guard
      # (_validate_public_storage in deployment.py) treats /var/data as
      # non-ephemeral, so NDA_ALLOW_EPHEMERAL_DATA is intentionally removed —
      # the guard is now ACTIVE and will refuse to boot if these ever regress
      # back to /tmp, which is exactly the protection the persistent disk buys.
      - key: NDA_DATA_DIR
        value: /var/data
      - key: NDA_USERS_PATH
        value: /var/data/users.json
      - key: NDA_EXPORTS_DIR
        value: /var/data/exports
      # Max number of matters retained in the store before the oldest are
      # evicted. Declared at the code default (matter_store.py
      # DEFAULT_MAX_STORED_MATTERS = 250) so it's flippable from the dashboard.
      - key: NDA_MATTER_RETENTION_LIMIT
        value: "250"
      # Render terminates TLS at one proxy in front of the app, so trust a
      # single X-Forwarded-For hop to rate-limit by real client IP instead of
      # the shared proxy peer. Enforce same-site Origin/Referer on state-changing
      # requests to block cross-site (CSRF) calls including forced logout.
      - key: NDA_TRUSTED_PROXY_COUNT
        value: "1"
      - key: NDA_ENFORCE_CSRF
        value: "true"
      - key: NDA_RATE_LIMIT_PER_MINUTE
        value: "120"
      - key: NDA_AI_REVIEW_ENABLED
        value: "true"
      # Confidence threshold below which an AI clause verdict is demoted to
      # human review. Declared at the code default (ai_review.py
      # DEFAULT_AI_REVIEW_THRESHOLD = 0.75) so it's flippable from the dashboard.
      - key: NDA_AI_REVIEW_THRESHOLD
        value: "0.75"
      - key: NDA_ACTIVE_REVIEW_ENGINE
        value: ai_first
      - key: NDA_AI_PROVIDER
        value: openrouter
      - key: NDA_AI_MODEL
        value: anthropic/claude-opus-4.8-fast
      # Per-request timeout for the single OpenRouter review call. The whole
      # review is ONE model call over the entire packet, so a large doc (120+
      # paragraphs) makes Opus take ~2 min. The previous 20s default timed out
      # and fail-closed the review on big NDAs. Must exceed worst-case large-doc
      # latency; matches the 180s frontend timeout (static/app.js).
      - key: NDA_AI_TIMEOUT_SECONDS
        value: "180"
      # Model for NDA GENERATION clause adaptation (rephrasing the Playbook's
      # authoritative clause text to the deal). Deliberately a FAST model and
      # SEPARATE from the review model above: generation runs synchronously on the
      # request the user waits on and adapts three clauses in parallel, so Opus here
      # pushed the generate past the frontend's 45s timeout on prod. DeepSeek V4 Flash
      # is the faster of the two DeepSeek models we already run (the slower
      # deepseek-v4-pro is the verifier below) and is reused from structure validation
      # + Gmail intake, so it adds no new model surface. Output is still bounded by the
      # GuardedClauseAdapter + the pre-save ship gate, so the faster model affects
      # speed/prose only, never correctness.
      - key: NDA_GENERATION_MODEL
        value: deepseek/deepseek-v4-flash
      # KILL-SWITCH for the NDA-generation prose-polish AI (the clause adapter
      # above). Set to "false" so generation skips building the OpenRouter clause
      # adapter entirely and runs the pure deterministic Playbook path: instant
      # (~0.15s), zero OpenRouter calls, still fully Playbook-compliant and
      # safety-gated. This trades the AI's prose polish (it only rephrases
      # already-on-position clauses, never the legal position) for reliability —
      # the live AI adapter caused repeated slow/timeout/crash generates on prod.
      # Flip back to "true" to re-enable the generation AI; the AI code stays
      # intact. Does NOT affect AI REVIEW (NDA_AI_REVIEW_ENABLED) or any other
      # AI feature — generation only.
      - key: NDA_GENERATION_AI_ENABLED
        value: "false"
      # NOTE: inbound NDAs are NOT auto-reviewed. They import "Not Reviewed" and the
      # full AI review runs ONLY on-demand when a human clicks Review (drained by a
      # single persistent worker pool, size = NDA_INBOUND_REVIEW_CONCURRENCY,
      # default 1). The former NDA_INBOUND_AI_REVIEW_ENABLED kill-switch is removed --
      # there is no inbound auto-review path to disable.
      # Gentle catch-up knob (code default 20). Caps how many inbound messages a
      # SINGLE poll cycle downloads + triages (NDA_GMAIL_TRIAGE_MODEL) + classifies
      # (intake) + text-extracts on the poll thread before queuing AI reviews. When
      # Gmail is (re)connected the first poll would otherwise catch up the whole
      # 90-day backlog at once -- a one-time burst that can OOM the single 2 GB
      # worker. Keeping this small drains the backlog a batch per poll: the
      # PERSISTENT dedup index skips already-imported messages BEFORE any
      # download/extract, so each cycle makes real progress until the backlog is
      # empty. Raise to drain faster at the cost of a larger per-poll burst.
      - key: NDA_GMAIL_IMPORT_LIMIT
        value: "20"
      # ADDITIVE table recovery for borderless 2-column signature/notice/term
      # blocks that the one-dimensional pypdf prose splitter flattens (e.g.
      # "Signature: Signature: / Name: Name:"). The code default is FALSE so local
      # runs and tests never require the camelot dependency; prod turns it ON here.
      # When ON it runs camelot `stream` ONLY on keyword-gated pages (those whose
      # text contains Signature / Notice to / Initial Term markers), so genuine
      # 2-column prose pages are never shattered into fake tables, and attaches the
      # recovered cells ADDITIVELY under quality.visual_profile.recovered_tables —
      # the pypdf prose paragraphs are never touched or reordered. camelot is
      # lazy-imported and the whole pass is fail-open + bounded by a process-wide
      # single-slot semaphore, so it can never crash or stack onto a review.
      # Requires the [tables] extra (installed by the Dockerfile); if camelot is
      # ever missing the feature no-ops with a clear log. Set "false" to disable.
      - key: NDA_TABLE_AUGMENTATION_ENABLED
        value: "true"
      # Independent adversarial second-opinion verifier on OpenRouter. It uses a
      # different model family from the main reviewer on purpose.
      - key: NDA_AI_VERIFIER
        value: "true"
      - key: NDA_AI_VERIFIER_MODEL
        value: deepseek/deepseek-v4-pro
      # Per-request timeout (seconds) for the adversarial verifier model call.
      # Declared at the code default (ai_verifier.py
      # DEFAULT_VERIFIER_TIMEOUT_SECONDS = 30) so it's flippable from the dashboard.
      - key: NDA_AI_VERIFIER_TIMEOUT_SECONDS
        value: "30"
      # AI structure-validation overlay (DeepSeek V4 Flash): demotes regime-3
      # style-misuse false-positive sections (signature fields, address lines, bare
      # connectives) the deterministic source-guard cannot catch. Additive + fail-safe
      # (any error falls back to the deterministic parse); verdicts are content-hash
      # cached so it bills at most once per document.
      - key: NDA_STRUCTURE_VALIDATION_ENABLED
        value: "true"
      - key: NDA_STRUCTURE_VALIDATION_MODEL
        value: deepseek/deepseek-v4-flash
      # Layer-2 AI semantic lint of the playbook (Claude Opus 4.8). ADVISORY ONLY:
      # surfaces meaning-level contradictions (prose that no rule enforces, redline
      # vs requirement, etc.) as draft-validation WARNINGS that never block publish.
      # Authoring-time only and rare, so the per-clause Opus cost on validate/publish
      # is acceptable; fully fail-open (any model error -> no warnings).
      - key: NDA_PLAYBOOK_SEMANTIC_LINT_ENABLED
        value: "true"
      - key: NDA_PLAYBOOK_SEMANTIC_LINT_MODEL
        value: anthropic/claude-opus-4.8
      - key: OPENROUTER_API_KEY
        sync: false
      # Gmail attachment-selector triage model. DeepSeek V4 Pro: the selection task
      # is structured (pick attachment IDs from a constrained candidate set, with the
      # intersection backstop neutralizing injection), so the cheaper/faster DeepSeek
      # Pro matches Opus quality at a fraction of the cost. Reuses the verifier's
      # model family, adding no new model surface.
      - key: NDA_GMAIL_TRIAGE_MODEL
        value: deepseek/deepseek-v4-pro
      # HARD wall-clock budget for the AI clause-adaptation step during NDA
      # generation (code default 8s). Prod's network to OpenRouter is slower than
      # local, so 12s preserves more AI rephrasing before the deterministic fallback
      # kicks in, while staying far under the frontend's 45s generate timeout.
      - key: NDA_GENERATION_ADAPT_BUDGET_SECONDS
        value: "12"
      # OpenRouter UPSTREAM-PROVIDER routing for the NDA-generation clause-adapter
      # call. DeepSeek V4 Flash is load-balanced across many upstreams; an
      # intermittent slow one (measured: ~11-24s vs the ~1s norm) drags the parallel
      # adapt step — which shares one wall-clock budget across the three concurrent
      # clause calls — to its ceiling whenever ANY one call is routed to it, which on
      # prod's slower network pushed generation past the frontend's 45s timeout even
      # with the AI deadline live. "latency" routes to the lowest-latency upstream
      # first (measured: median ~1s, max ~3.7s — the slow tail is gone). A routing
      # hint only: same model, same prompt, same guard-checked output, faster path.
      # Set empty to fall back to OpenRouter's default balancing.
      - key: NDA_GENERATION_PROVIDER_SORT
        value: latency
      # Incident levers (flippable from the Render dashboard during an incident).
      # Each value below is declared at its CURRENT code default, so adding them
      # here is behavior-neutral — they simply surface the knobs in the dashboard
      # so they can be flipped without a code change/redeploy.
      #
      # Master Gmail-poller stop. Emergency kill switch checked BEFORE settings are
      # read (server.py _gmail_sync_enabled). Any falsey value (false/0/no/off)
      # hard-stops polling; default-enabled.
      - key: NDA_GMAIL_SYNC_ENABLED
        value: "true"
      # Inbound auto-review worker-pool size = the concurrency bound (the anti-storm
      # serialization guarantee). Code default 1 (ingestion_service.py
      # inbound_review_concurrency).
      - key: NDA_INBOUND_REVIEW_CONCURRENCY
        value: "1"
      # Per-matter AI-review failure cap before the recovery sweep gives up
      # re-enqueuing it (poison-pill guard). Code default 3
      # (ingestion_service.py inbound_review_max_failures).
      - key: NDA_INBOUND_REVIEW_MAX_FAILURES
        value: "3"
      # Right-of-way backoff (seconds) before a generation-deferred review job is
      # re-enqueued. Code default 0.25 (ingestion_service.py
      # inbound_review_defer_backoff_seconds).
      - key: NDA_INBOUND_REVIEW_DEFER_BACKOFF_SECONDS
        value: "0.25"
      # Gmail intake classifier model (twin of NDA_GMAIL_TRIAGE_MODEL above).
      # DeepSeek V4 Flash is the tournament winner; code default
      # "deepseek/deepseek-v4-flash" (gmail_intake_classifier.py).
      - key: NDA_GMAIL_INTAKE_MODEL
        value: deepseek/deepseek-v4-flash
