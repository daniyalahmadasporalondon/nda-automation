services:
  - type: web
    name: nda-automation
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: NDA_REQUIRE_AUTH
        value: "true"
      # Per-user Google OAuth (below) is the tenant boundary: each signed-in
      # account owns and only sees its own matters. HTTP Basic auth is a single
      # break-glass operator credential, NOT a shared multi-user login, so its
      # username is operator-set (sync: false) rather than a baked-in shared
      # "nda-admin" that would collapse every operator into one authz identity.
      - key: NDA_AUTH_USERNAME
        sync: false
      - key: NDA_AUTH_PASSWORD
        sync: false
      # Identities (Google account id or Basic username) allowed to use
      # admin-only endpoints such as the full matter backup export.
      - key: NDA_ADMIN_USERS
        sync: false
      - key: NDA_ALLOWED_HOSTS
        sync: false
      - key: NDA_GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: NDA_GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: NDA_GOOGLE_OAUTH_REDIRECT_URI
        sync: false
      - key: NDA_GMAIL_OAUTH_REDIRECT_URI
        sync: false
      - key: NDA_DATA_DIR
        value: /tmp/nda-automation/data
      - key: NDA_USERS_PATH
        value: /tmp/nda-automation/data/users.json
      - key: NDA_EXPORTS_DIR
        value: /tmp/nda-automation/exports
      - key: NDA_ALLOW_EPHEMERAL_DATA
        value: "true"
      # Render terminates TLS at one proxy in front of the app, so trust a
      # single X-Forwarded-For hop to rate-limit by real client IP instead of
      # the shared proxy peer. Enforce same-site Origin/Referer on state-changing
      # requests to block cross-site (CSRF) calls including forced logout.
      - key: NDA_TRUSTED_PROXY_COUNT
        value: "1"
      - key: NDA_ENFORCE_CSRF
        value: "true"
      - key: NDA_RATE_LIMIT_PER_MINUTE
        value: "120"
      - key: NDA_AI_REVIEW_ENABLED
        value: "true"
      - key: NDA_ACTIVE_REVIEW_ENGINE
        value: ai_first
      - key: NDA_AI_PROVIDER
        value: openrouter
      - key: NDA_AI_MODEL
        value: anthropic/claude-opus-4.8
      # Independent adversarial second-opinion verifier on OpenRouter. It uses a
      # different model family from the main reviewer on purpose.
      - key: NDA_AI_VERIFIER
        value: "true"
      - key: NDA_AI_VERIFIER_MODEL
        value: deepseek/deepseek-v4-pro
      # AI structure-validation overlay (DeepSeek V4 Flash): demotes regime-3
      # style-misuse false-positive sections (signature fields, address lines, bare
      # connectives) the deterministic source-guard cannot catch. Additive + fail-safe
      # (any error falls back to the deterministic parse); verdicts are content-hash
      # cached so it bills at most once per document.
      - key: NDA_STRUCTURE_VALIDATION_ENABLED
        value: "true"
      - key: NDA_STRUCTURE_VALIDATION_MODEL
        value: deepseek/deepseek-v4-flash
      # Layer-2 AI semantic lint of the playbook (Claude Opus 4.8). ADVISORY ONLY:
      # surfaces meaning-level contradictions (prose that no rule enforces, redline
      # vs requirement, etc.) as draft-validation WARNINGS that never block publish.
      # Authoring-time only and rare, so the per-clause Opus cost on validate/publish
      # is acceptable; fully fail-open (any model error -> no warnings).
      - key: NDA_PLAYBOOK_SEMANTIC_LINT_ENABLED
        value: "true"
      - key: NDA_PLAYBOOK_SEMANTIC_LINT_MODEL
        value: anthropic/claude-opus-4.8
      - key: OPENROUTER_API_KEY
        sync: false
      - key: NDA_GMAIL_TRIAGE_MODEL
        value: anthropic/claude-opus-4.8
