services:
  - type: web
    name: nda-automation
    runtime: python
    plan: free
    buildCommand: python -m pip install --upgrade pip && python -m pip install ".[gmail]"
    startCommand: python -m nda_automation.server --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: NDA_REQUIRE_AUTH
        value: "true"
      - key: NDA_AUTH_USERNAME
        value: nda-admin
      - key: NDA_AUTH_PASSWORD
        sync: false
      - key: NDA_DATA_DIR
        value: /tmp/nda-automation-data
      - key: NDA_EXPORTS_DIR
        value: /tmp/nda-automation-exports
