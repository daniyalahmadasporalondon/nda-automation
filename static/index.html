<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>nda automation</title>
    <link rel="stylesheet" href="/static/styles.css?v=14">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">aspora legal</p>
          <h1>nda automation</h1>
        </div>
        <div class="topbar-actions">
          <nav class="tabbar" aria-label="Workspace">
            <button class="tab-button active" type="button" data-tab="review">Review</button>
            <button class="tab-button" type="button" data-tab="clauses">Hard clauses</button>
          </nav>
          <div class="mode-pill">hard clauses only</div>
        </div>
      </header>

      <main class="review-workstation view active" id="reviewView" data-view="review">
        <aside class="review-rail" aria-label="Review workspace">
          <div class="rail-logo">A</div>
          <div class="rail-current">Review</div>
        </aside>

        <section class="review-shell">
          <header class="review-titlebar">
            <div>
              <p class="eyebrow">nda review</p>
              <h2>Hard-clause workstation</h2>
            </div>
            <div class="review-scope">Hard clauses only</div>
          </header>

          <section class="review-stage">
            <section class="document-workbench">
              <div class="document-toolbar">
                <div>
                  <p class="eyebrow">document</p>
                  <h2>Source text</h2>
                </div>
                <label class="file-button">
                  <input id="fileInput" type="file" accept=".docx,.txt,.md,.text,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
                  Upload file
                </label>
              </div>

              <div class="document-canvas">
                <div class="document-page">
                  <textarea id="ndaText" spellcheck="false" placeholder="Paste NDA text here"></textarea>
                </div>
              </div>
            </section>

            <aside class="verdict-rail">
              <div class="result-hero" id="resultHero">
                <div>
                  <p class="eyebrow">verdict</p>
                  <h2 id="overallTitle">Awaiting review</h2>
                </div>
                <div class="result-mark" id="resultMark">-</div>
              </div>

              <section class="verdict-section">
                <div class="results-heading">
                  <div>
                    <p class="eyebrow">checklist</p>
                    <h2>Hard clauses</h2>
                  </div>
                </div>
                <div class="clause-grid" id="clauseGrid"></div>
              </section>

              <section class="verdict-section selected-clause-panel" id="reviewDetail">
                <div class="review-detail-empty">
                  <p class="eyebrow">clause detail</p>
                  <h2>No review yet</h2>
                </div>
              </section>
            </aside>
          </section>

          <footer class="review-actionbar">
            <div class="file-meta" id="fileMeta">No file selected</div>
            <div class="actions">
              <button id="reviewButton" type="button">Review NDA</button>
              <button id="clearButton" class="secondary" type="button">Clear</button>
            </div>
          </footer>
        </section>
      </main>

      <main class="playbook-view view" id="clausesView" data-view="clauses">
        <section class="playbook-shell">
          <aside class="clause-rail">
            <div class="rail-heading">
              <p class="eyebrow">hard clauses</p>
              <h2>Aspora playbook</h2>
            </div>
            <div class="playbook-list" id="playbookList"></div>
          </aside>

          <section class="clause-detail" id="clauseDetail"></section>
        </section>
      </main>
    </div>

    <script src="/static/app.js?v=14"></script>
  </body>
</html>
